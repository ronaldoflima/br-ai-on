name: orchestrator
display_name: Orchestrator
domain:
  - orquestracao
  - coordenacao
  - decomposicao
  - multi-agente
  - fan-out
  - fan-in
layer: infrastructure
version: 1.0.0

model: claude-sonnet-4-6
fallback_model: claude-haiku-4-5

runtime:
  permission_mode: acceptEdits  # generic: auto | confirm | bypass — ou valor nativo do backend

capabilities:
  - Decomposição de tarefas complexas em sub-tarefas
  - Coordenação fan-out/fan-in entre agentes
  - Roteamento dinâmico por capabilities
  - Escalation e resolução de conflitos

schedule:
  mode: handoff-only
  priority: 0
  run_alone: false

budget:
  max_sessions_per_day: 20

integrations:
  telegram:
    enabled: true
  notion:
    enabled: false
  obsidian:
    enabled: false
