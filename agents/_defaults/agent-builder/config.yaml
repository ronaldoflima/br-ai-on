name: agent-builder
display_name: AgentBuilder
domain:
  - meta
  - infraestrutura
  - criacao-de-agentes
layer: infrastructure
version: "0.1.0"
model: claude-sonnet-4-6
fallback_model: claude-haiku-4-5

capabilities:
  - Criar novos agentes com IDENTITY, config e estrutura
  - Scaffold de diretórios e templates padrão
  - Definir identidade e regras de comportamento
  - Configurar integrações e collaborators

schedule:
  mode: handoff-only
  interval: "30m"
  priority: 3
  run_alone: false

budget:
  max_sessions_per_day: 5

integrations:
  telegram:
    enabled: true
