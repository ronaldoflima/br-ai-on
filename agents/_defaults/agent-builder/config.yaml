name: agent-builder
display_name: AgentBuilder
domain:
  - meta
  - infraestrutura
  - criacao-de-agentes
layer: infrastructure
version: "0.2.0"
model: claude-sonnet-4-6
fallback_model: claude-haiku-4-5

capabilities:
  - Criar novos agentes com IDENTITY, config e estrutura completa
  - Validar config.yaml contra schema e heurísticas do ecossistema
  - Consultar catálogo de agentes existentes para evitar sobreposição
  - Definir identidade, regras de comportamento e contexto operacional
  - Configurar integrações, runtime, collaborators e working_directory
  - Dimensionar budget e escolher modelo baseado no tipo de agente

schedule:
  mode: handoff-only
  interval: "30m"
  priority: 3
  run_alone: false

budget:
  max_tokens_per_session: 80000
  max_sessions_per_day: 5

runtime:
  permission_mode: bypassPermissions

integrations:
  telegram:
    enabled: true
  notion:
    enabled: false
  obsidian:
    enabled: false
