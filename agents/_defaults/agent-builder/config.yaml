name: agent-builder
display_name: AgentBuilder
domain:
  - meta
  - infraestrutura
  - criacao-de-agentes
version: "0.1.0"
model: claude-sonnet-4-6
fallback_model: claude-haiku-4-5

schedule:
  mode: handoff-only
  interval: "30m"
  priority: 3
  run_alone: false

budget:
  max_tokens_per_session: 80000
  max_sessions_per_day: 5
