name: task-manager
display_name: TaskManager
domain: Tarefas/Produtividade
version: "0.1.0"
model: claude-sonnet-4-6
fallback_model: claude-haiku-4-5

schedule:
  mode: alive
  interval: "30m"
  priority: 1
  run_alone: false

budget:
  max_tokens_per_session: 50000
  max_sessions_per_day: 10

integrations:
  telegram:
    enabled: false
  notion:
    enabled: false
  obsidian:
    enabled: false
    inbox: "agents/inbox"
    identity: "taskmanager"
