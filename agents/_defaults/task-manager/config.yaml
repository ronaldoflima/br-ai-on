name: task-manager
display_name: TaskManager
domain:
  - tarefas
  - produtividade
layer: productivity
version: "1.0.0"
model: claude-sonnet-4-6
fallback_model: claude-haiku-4-5

capabilities:
  - Sincronizar tarefas com Notion
  - Priorizar e organizar backlog
  - Extrair tarefas de conversas e handoffs
  - Monitorar deadlines e progresso

schedule:
  mode: alive
  interval: "1m"
  priority: 1
  run_alone: false

runtime:
  claude:
    permission_mode: bypassPermissions  # acceptEdits | auto | bypassPermissions | plan | dontAsk

budget:
  max_tokens_per_session: 50000
  max_sessions_per_day: 100
