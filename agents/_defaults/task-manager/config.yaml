name: task-manager
display_name: TaskManager
domain:
  - tarefas
  - produtividade
version: "1.0.0"
model: claude-sonnet-4-6
fallback_model: claude-haiku-4-5

schedule:
  mode: alive
  interval: "2h"
  priority: 1
  run_alone: false

budget:
  max_tokens_per_session: 50000
  max_sessions_per_day: 10
